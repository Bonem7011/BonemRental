services:
  php-site:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: anonyme
      POSTGRES_PASSWORD: anonyme
      POSTGRES_DB: bonemrental
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
      - dbdata:/var/lib/postgresql/data
volumes:
  dbdata: